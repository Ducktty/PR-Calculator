<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市赚率分析器 Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .glass-card { background: rgba(23, 23, 23, 0.8); border: 1px solid #333; backdrop-filter: blur(10px); }
        .input-field { background: #171717; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; color: #fff; }
        .input-field:focus { border-color: #3b82f6; outline: none; }
        .btn-primary { background: #3b82f6; color: white; padding: 12px; border-radius: 8px; font-weight: 600; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .status-red { color: #ef4444; }
        .status-yellow { color: #f59e0b; }
        .status-green { color: #10b981; }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-20">

<div id="app" class="max-w-md mx-auto p-4">
    <!-- Header -->
    <header class="flex justify-between items-center mb-6 pt-4">
        <h1 class="text-2xl font-bold tracking-tight">市赚率 <span class="text-blue-500 text-sm font-normal">v1.0</span></h1>
        <button onclick="toggleHistory()" class="p-2 glass-card rounded-full">
            <i data-lucide="history" class="w-5 h-5"></i>
        </button>
    </header>

    <!-- Main Form -->
    <div id="calculator-view">
        <div class="flex gap-2 mb-6">
            <button id="mode-pe" onclick="setMode('PE')" class="flex-1 p-2 rounded-lg font-bold border border-blue-500 bg-blue-500/10 text-blue-500">PE 模式</button>
            <button id="mode-pb" onclick="setMode('PB')" class="flex-1 p-2 rounded-lg font-bold border border-gray-700 text-gray-500">PB 模式</button>
        </div>

        <div class="space-y-4">
            <!-- Basic Info -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">股票代码/名称</label>
                    <input type="text" id="stockName" class="input-field" placeholder="例如: NVDA">
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1" id="valuationLabel">PE (TTM)</label>
                    <input type="number" id="valuationValue" class="input-field" placeholder="数值">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">ROE (%)</label>
                    <input type="number" id="roe" class="input-field" placeholder="27.29">
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">股利支付率 (%)</label>
                    <input type="number" id="payout" class="input-field" placeholder="默认 50">
                </div>
            </div>

            <!-- Smart Paste Tool -->
            <div class="glass-card p-4 rounded-xl">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-semibold text-blue-400">智能粘贴解析 (AI 模式)</span>
                    <button onclick="parseClipboard()" class="text-xs bg-blue-500/20 px-2 py-1 rounded text-blue-400">粘贴并解析</button>
                </div>
                <textarea id="smartPaste" class="w-full h-12 bg-black/40 border border-dashed border-gray-600 rounded p-2 text-xs text-gray-400" placeholder="复制 Yahoo/WSJ 的文本丢在这里..."></textarea>
            </div>

            <!-- Red Flags (Optional Toggles) -->
            <details class="glass-card p-3 rounded-xl">
                <summary class="text-sm text-gray-400 cursor-pointer">红灯检测指标 (可选)</summary>
                <div class="grid grid-cols-1 gap-3 mt-3">
                    <div class="flex gap-2">
                        <input type="number" id="liabilities" class="input-field text-xs" placeholder="总负债">
                        <input type="number" id="assets" class="input-field text-xs" placeholder="总资产">
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="opIncome" class="input-field text-xs" placeholder="营业利润">
                        <input type="number" id="netIncome" class="input-field text-xs" placeholder="净利润">
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="goodwill" class="input-field text-xs" placeholder="商誉+存货">
                        <input type="number" id="impairment" class="input-field text-xs" placeholder="资产减值">
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="opCashFlow" class="input-field text-xs" placeholder="经营现金流">
                        <select id="industry" class="input-field text-xs">
                            <option value="none">非周期行业</option>
                            <option value="cycle">周期性行业 (航运/钢铁/大宗...)</option>
                        </select>
                    </div>
                </div>
            </details>

            <button onclick="calculatePR()" class="btn-primary w-full shadow-lg shadow-blue-500/20">开始诊断</button>
        </div>
    </div>

    <!-- Result View (Hidden by default) -->
    <div id="result-view" class="hidden space-y-6 animate-in fade-in duration-500">
        <div class="glass-card p-6 rounded-2xl text-center relative overflow-hidden">
            <div id="rating-bg" class="absolute inset-0 opacity-10"></div>
            <h2 class="text-gray-400 text-sm mb-1">当前市赚率 (PR)</h2>
            <div id="pr-value" class="text-5xl font-bold mb-2">0.00</div>
            <div id="pr-level" class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">---</div>
        </div>

        <!-- Red Flags Result -->
        <div id="redflags-container" class="space-y-2">
            <!-- Dynaimcally injected -->
        </div>

        <!-- Sensitivity Analysis -->
        <div class="glass-card p-4 rounded-2xl">
            <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-wider">ROE 敏感性分析 (±30%)</h3>
            <div class="flex justify-between items-center">
                <div class="text-center flex-1 border-r border-gray-800">
                    <div class="text-xs text-gray-500 mb-1">-30% ROE</div>
                    <div id="sen-low" class="font-semibold">--</div>
                </div>
                <div class="text-center flex-1 border-r border-gray-800">
                    <div class="text-xs text-gray-500 mb-1">当前 ROE</div>
                    <div id="sen-mid" class="font-semibold text-blue-400">--</div>
                </div>
                <div class="text-center flex-1">
                    <div class="text-xs text-gray-500 mb-1">+30% ROE</div>
                    <div id="sen-high" class="font-semibold">--</div>
                </div>
            </div>
        </div>

        <div class="flex gap-3">
            <button onclick="saveHistory()" class="btn-primary flex-1 bg-green-600 shadow-green-500/10">保存记录</button>
            <button onclick="resetApp()" class="btn-primary flex-1 bg-gray-800 text-gray-400">重新开始</button>
        </div>
    </div>

    <!-- History View (Hidden) -->
    <div id="history-view" class="hidden space-y-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">查询历史</h2>
            <button onclick="clearAllHistory()" class="text-xs text-red-500">清空全部</button>
        </div>
        <div id="history-list" class="space-y-3">
            <!-- Dynamic -->
        </div>
        <button onclick="toggleHistory()" class="w-full p-4 text-gray-500 text-sm">返回计算器</button>
    </div>
</div>

<script>
    let currentMode = 'PE';
    let history = JSON.parse(localStorage.getItem('pr_history') || '[]');

    // Initialize Lucide Icons
    lucide.createIcons();

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-pe').className = mode === 'PE' ? 'flex-1 p-2 rounded-lg font-bold border border-blue-500 bg-blue-500/10 text-blue-500' : 'flex-1 p-2 rounded-lg font-bold border border-gray-700 text-gray-500';
        document.getElementById('mode-pb').className = mode === 'PB' ? 'flex-1 p-2 rounded-lg font-bold border border-blue-500 bg-blue-500/10 text-blue-500' : 'flex-1 p-2 rounded-lg font-bold border border-gray-700 text-gray-500';
        document.getElementById('valuationLabel').innerText = mode === 'PE' ? 'PE (TTM)' : 'PB (MRQ)';
    }

    function calculatePR() {
        const stockName = document.getElementById('stockName').value || '未命名股票';
        const vValue = parseFloat(document.getElementById('valuationValue').value);
        const roe = parseFloat(document.getElementById('roe').value);
        let payout = parseFloat(document.getElementById('payout').value);
        
        if (isNaN(vValue) || isNaN(roe)) {
            alert("请输入完整的估值和 ROE 数据");
            return;
        }

        // 盲区 A 处理
        if (payout === 0) {
            alert("该企业未分红，可能处于高速扩张期，不适用分红修正逻辑。");
        }
        if (isNaN(payout)) payout = 50;

        // 1. 计算修正系数 N
        let N = 1;
        if (payout >= 50) N = 1;
        else if (payout <= 25) N = 2;
        else N = 50 / payout;

        // 2. 计算 PR
        let pr = 0;
        if (currentMode === 'PE') {
            pr = N * vValue / roe;
        } else {
            pr = (N * vValue / (roe * roe)) * 100;
        }

        displayResult(pr, stockName, N, roe, vValue, payout);
    }

    function displayResult(pr, name, N, roe, vValue, payout) {
        document.getElementById('calculator-view').classList.add('hidden');
        document.getElementById('result-view').classList.remove('hidden');

        const prText = pr.toFixed(3);
        document.getElementById('pr-value').innerText = prText;
        
        // 估值等级判别
        const levelObj = getLevel(pr);
        const levelEl = document.getElementById('pr-level');
        levelEl.innerText = levelObj.text;
        levelEl.style.backgroundColor = levelObj.color + '20';
        levelEl.style.color = levelObj.color;
        document.getElementById('pr-value').style.color = levelObj.color;

        // 红灯检测计算
        runRedFlags();

        // 敏感性分析
        const lowROE = roe * 0.7;
        const highROE = roe * 1.3;
        let sLow, sHigh;
        if (currentMode === 'PE') {
            sLow = N * vValue / lowROE;
            sHigh = N * vValue / highROE;
        } else {
            sLow = (N * vValue / (lowROE * lowROE)) * 100;
            sHigh = (N * vValue / (highROE * highROE)) * 100;
        }
        document.getElementById('sen-low').innerText = sLow.toFixed(2);
        document.getElementById('sen-mid').innerText = pr.toFixed(2);
        document.getElementById('sen-high').innerText = sHigh.toFixed(2);
    }

    function getLevel(pr) {
        if (pr < 0.40) return { text: "极度低估", color: "#10b981" };
        if (pr < 0.60) return { text: "巴菲特四折区", color: "#34d399" };
        if (pr < 0.80) return { text: "巴菲特六折区", color: "#60a5fa" };
        if (pr <= 1.00) return { text: "合理偏低", color: "#93c5fd" };
        if (pr <= 1.30) return { text: "偏高估值", color: "#f59e0b" };
        return { text: "明显高估", color: "#ef4444" };
    }

    function runRedFlags() {
        const container = document.getElementById('redflags-container');
        container.innerHTML = '';
        let flags = [];

        const assets = parseFloat(document.getElementById('assets').value);
        const liab = parseFloat(document.getElementById('liabilities').value);
        if (liab / assets > 0.7) flags.push({ t: "高负债红灯", v: `杠杆率 ${(liab/assets*100).toFixed(1)}% > 70%` });

        if (document.getElementById('industry').value === 'cycle') flags.push({ t: "周期行业警告", v: "行业顶峰 PR 容易失真", type: 'warn' });

        const opIn = parseFloat(document.getElementById('opIncome').value);
        const netIn = parseFloat(document.getElementById('netIncome').value);
        if (opIn / netIn < 0.8) flags.push({ t: "非经常损益红灯", v: `核心利润占比 ${(opIn/netIn*100).toFixed(1)}% < 80%` });

        const gw = parseFloat(document.getElementById('goodwill').value);
        if (gw / assets > 0.15) flags.push({ t: "虚高资产红灯", v: `商誉存货占比 ${(gw/assets*100).toFixed(1)}% > 15%` });

        const imp = parseFloat(document.getElementById('impairment').value);
        if (imp / netIn > 0.1) flags.push({ t: "资产减值红灯", v: `减值占比 ${(imp/netIn*100).toFixed(1)}% > 10%` });

        const cash = parseFloat(document.getElementById('opCashFlow').value);
        if (cash / netIn < 0.8) flags.push({ t: "纸面富贵红灯", v: `现金净利比 ${(cash/netIn).toFixed(2)} < 0.8` });

        if (flags.length === 0) {
            container.innerHTML = `<div class="status-green text-xs p-2 bg-green-500/10 rounded-lg text-center font-bold">✅ 未触发红灯，数据可信度高</div>`;
        } else {
            flags.forEach(f => {
                container.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-red-500/10 rounded-xl border border-red-500/20">
                        <span class="text-xs font-bold text-red-500">${f.t}</span>
                        <span class="text-[10px] text-red-400">${f.v}</span>
                    </div>
                `;
            });
        }
    }

    function saveHistory() {
        const record = {
            id: Date.now(),
            name: document.getElementById('stockName').value || '未命名',
            pr: document.getElementById('pr-value').innerText,
            level: document.getElementById('pr-level').innerText,
            date: new Date().toLocaleDateString()
        };
        history.unshift(record);
        localStorage.setItem('pr_history', JSON.stringify(history));
        alert("已保存到本地记录");
    }

    function toggleHistory() {
        const hv = document.getElementById('history-view');
        const cv = document.getElementById('calculator-view');
        const rv = document.getElementById('result-view');
        if (hv.classList.contains('hidden')) {
            hv.classList.remove('hidden');
            cv.classList.add('hidden');
            rv.classList.add('hidden');
            renderHistory();
        } else {
            hv.classList.add('hidden');
            cv.classList.remove('hidden');
        }
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = history.map(item => `
            <div class="glass-card p-4 rounded-xl flex justify-between items-center">
                <div>
                    <div class="font-bold text-blue-400">${item.name}</div>
                    <div class="text-[10px] text-gray-500">${item.date} · PR: ${item.pr}</div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xs font-bold text-gray-400">${item.level}</span>
                    <button onclick="deleteHistory(${item.id})" class="text-red-900"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function deleteHistory(id) {
        history = history.filter(h => h.id !== id);
        localStorage.setItem('pr_history', JSON.stringify(history));
        renderHistory();
    }

    function clearAllHistory() {
        if(confirm("确定清空吗？")) {
            history = [];
            localStorage.setItem('pr_history', '[]');
            renderHistory();
        }
    }

    function resetApp() {
        location.reload();
    }

    // 智能解析逻辑 (AI Proxy 模拟)
function parseClipboard() {
    const text = document.getElementById('smartPaste').value;
    
    // 定义匹配规则
    const extract = (regex) => {
        const match = text.match(regex);
        return match ? match[1].replace(/,/g, '') : null;
    };

    // 自动填充基础字段
    const name = extract(/股票名称:\s*(.+)/);
    if (name) document.getElementById('stockName').value = name;

    const pe = extract(/PE_TTM:\s*([\d\.]+)/);
    if (pe) document.getElementById('valuationValue').value = pe;

    const roe = extract(/ROE:\s*([\d\.]+)/);
    if (roe) document.getElementById('roe').value = roe;

    const payout = extract(/股利支付率:\s*([\d\.]+)/);
    if (payout) document.getElementById('payout').value = payout;

    // 自动填充红灯检测字段
    const assets = extract(/总资产:\s*([\d\.]+)/);
    if (assets) document.getElementById('assets').value = assets;

    const liab = extract(/总负债:\s*([\d\.]+)/);
    if (liab) document.getElementById('liabilities').value = liab;

    const opIn = extract(/营业利润:\s*([\d\.]+)/);
    if (opIn) document.getElementById('opIncome').value = opIn;

    const netIn = extract(/净利润:\s*([\d\.]+)/);
    if (netIn) document.getElementById('netIncome').value = netIn;

    const gw = extract(/商誉存货:\s*([\d\.]+)/);
    if (gw) document.getElementById('goodwill').value = gw;

    const imp = extract(/资产减值:\s*([\d\.]+)/);
    if (imp) document.getElementById('impairment').value = imp;

    const ocf = extract(/经营现金流:\s*([\d\.]+)/);
    if (ocf) document.getElementById('opCashFlow').value = ocf;

    const industry = extract(/行业:\s*(.+)/);
    if (industry) {
        // 简单的周期行业自动识别
        const cycleKeywords = ['半导体', '航运', '钢铁', '煤炭', '石油', '化工', 'Semiconductors', 'Steel', 'Oil'];
        const isCycle = cycleKeywords.some(k => industry.includes(k));
        document.getElementById('industry').value = isCycle ? 'cycle' : 'none';
    }

    alert("✅ 解析完成！核心指标已自动填入表单。");
}
</script>

</body>
</html>
